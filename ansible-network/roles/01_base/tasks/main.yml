# ============================================================
#  Role: 01_base
#  Mục đích: Cấu hình cơ bản (hostname, credentials, console)
#  Áp dụng: ALL devices
# ============================================================
---
- name: "BASE | Cấu hình hostname"
  cisco.ios.ios_config:
    lines:
      - "hostname {{ hostname }}"

- name: "BASE | Tắt DNS lookup"
  cisco.ios.ios_config:
    lines:
      - "no ip domain-lookup"

- name: "BASE | Cấu hình domain cho SSH"
  cisco.ios.ios_config:
    lines:
      - "ip domain-name {{ ssh_domain_name }}"

- name: "BASE | Bật service password-encryption"
  cisco.ios.ios_config:
    lines:
      - "service password-encryption"

- name: "BASE | Cấu hình enable secret"
  cisco.ios.ios_config:
    lines:
      - "enable secret {{ enable_secret }}"

- name: "BASE | Tạo local user cho SSH"
  cisco.ios.ios_config:
    lines:
      - "username {{ local_user }} privilege 15 secret {{ local_user_password }}"

- name: "BASE | Bật SSH version 2"
  cisco.ios.ios_config:
    lines:
      - "ip ssh version 2"
      - "ip ssh authentication-retries 3"

- name: "BASE | Cấu hình line console"
  cisco.ios.ios_config:
    lines:
      - "logging synchronous"
      - "exec-timeout 0 0"
    parents: "line con 0"

- name: "BASE | Cấu hình line VTY 0 4"
  cisco.ios.ios_config:
    lines:
      - "login local"
      - "transport input ssh"
    parents: "line vty 0 4"

- name: "BASE | Lưu cấu hình"
  cisco.ios.ios_config:
    save_when: modified
