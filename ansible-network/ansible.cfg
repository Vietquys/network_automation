[defaults]
# ============================================================
# Ansible Configuration - Network Automation Project
# ============================================================

inventory = inventory.ini
host_key_checking = False
retry_files_enabled = False

# Tăng tốc khi chạy nhiều thiết bị
forks = 10

# Output dễ đọc cho báo cáo
stdout_callback = default
callback_result_format = yaml

[persistent_connection]
# Rất quan trọng cho network_cli
connect_timeout = 30
command_timeout = 30